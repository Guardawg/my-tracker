<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro & Step Tracker</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        .input-card { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 2rem; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .input-group { display: flex; flex-direction: column; }
        input { padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { background-color: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; }
        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 1rem; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>
<div class="container">
    <h1>Macro & Step Tracker</h1>
    <div class="input-card">
        <div class="grid-inputs">
            <div class="input-group"><label>Protein (g)</label><input type="number" id="protein"></div>
            <div class="input-group"><label>Carbs (g)</label><input type="number" id="carbs"></div>
            <div class="input-group"><label>Fat (g)</label><input type="number" id="fat"></div>
            <div class="input-group"><label>Steps</label><input type="number" id="steps"></div>
        </div>
        <button onclick="addRow()">Add Entry</button>
    </div>
    <div class="table-container">
        <table>
            <thead><tr><th>Date</th><th>Protein</th><th>Carbs</th><th>Fat</th><th>Calories</th><th>Steps</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
   <script>
    window.onload = () => {
        updateTotals();
    };

    function updateTotals() {
        const saved = JSON.parse(localStorage.getItem('macroData') || '[]');
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ''; // Clear current table

        let totalP = 0, totalC = 0, totalF = 0, totalCal = 0, totalSteps = 0;

        saved.forEach(e => {
            totalP += e.p;
            totalC += e.c;
            totalF += e.f;
            totalCal += e.calories;
            totalSteps += e.s;
            renderRow(e);
        });

        // Update a "Running Tab" header if you add one, 
        // or just add a special "TOTAL" row at the top
        renderTotalRow(totalP, totalC, totalF, totalCal, totalSteps);
    }

    function addRow() {
        const p = parseFloat(document.getElementById('protein').value) || 0;
        const c = parseFloat(document.getElementById('carbs').value) || 0;
        const f = parseFloat(document.getElementById('fat').value) || 0;
        const s = parseInt(document.getElementById('steps').value) || 0;
        
        const entry = { 
            date: new Date().toLocaleDateString(), 
            p, c, f, 
            calories: (p * 4) + (c * 4) + (f * 9), 
            s 
        };

        const saved = JSON.parse(localStorage.getItem('macroData') || '[]');
        saved.unshift(entry);
        localStorage.setItem('macroData', JSON.stringify(saved));
        
        updateTotals(); // Refresh the whole table and running tab

        // Clear inputs
        document.querySelectorAll('input').forEach(input => input.value = '');
    }

    function renderRow(e) {
        const row = document.getElementById('tableBody').insertRow(-1);
        row.innerHTML = `<td>${e.date}</td><td>${e.p}g</td><td>${e.c}g</td><td>${e.f}g</td><td>${e.calories}</td><td>${e.s.toLocaleString()}</td>`;
    }

    function renderTotalRow(p, c, f, cal, s) {
        const tableBody = document.getElementById('tableBody');
        const row = tableBody.insertRow(0); // Put the running tab at the very top
        row.style.backgroundColor = "#e2e8f0";
        row.style.fontWeight = "bold";
        row.innerHTML = `<td>RUNNING TAB</td><td>${p}g</td><td>${c}g</td><td>${f}g</td><td>${cal}</td><td>${s.toLocaleString()}</td>`;
    }
</script>
</body>
</html>
</html>}
